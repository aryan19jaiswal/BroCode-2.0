spring.application.name=broCode-server

# Railway provides PORT; keep a local default.
server.port=${PORT:1107}

# Trust reverse-proxy headers (needed for correct HTTPS handling behind Railway).
server.forward-headers-strategy=framework

# MongoDB Configuration (set via Railway variables)
spring.data.mongodb.uri=${MONGODB_URI}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:604800000}

# CORS Configuration
frontend.allowed-origins=${FRONTEND_ALLOWED_ORIGINS:http://localhost:8080}

# Auth cookie behavior (for cross-site Vercel -> Railway requests)
app.cookie.secure=${COOKIE_SECURE:false}
app.cookie.same-site=${COOKIE_SAMESITE:Lax}

# Chat Session TTL (minutes) : sessions idle beyond this are evicted
chat.session.ttl-minutes=${CHAT_SESSION_TTL_MINUTES:30}

# Gemini related information
gemini.api.key=${GEMINI_API_KEY}
gemini.model.name=${GEMINI_MODEL_NAME:gemini-2.5-flash-lite}
gemini.temperature=${GEMINI_TEMPERATURE:0.7}
gemini.top_p=${GEMINI_TOP_P:1}
gemini.frequency.penalty=${GEMINI_FREQUENCY_PENALTY:0.5}
gemini.presence.penalty=${GEMINI_PRESENCE_PENALTY:0.5}
gemini.max.output_tokens=${GEMINI_MAX_OUTPUT_TOKENS:2048}
gemini.rpm.limit=${GEMINI_RPM_LIMIT:5}
gemini.tpm.limit=${GEMINI_TPM_LIMIT:100000}
