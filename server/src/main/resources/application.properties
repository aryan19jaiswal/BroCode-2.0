spring.application.name=broCode-server
server.port=1107

# Activate the 'local' profile in dev to load application-local.properties.
# In production, remove this line and set all secrets via environment variables.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# MongoDB — set MONGODB_URI in environment or application-local.properties
spring.data.mongodb.uri=${MONGODB_URI}

# JWT — set JWT_SECRET to a cryptographically random 256-bit key (openssl rand -base64 32)
jwt.secret=${JWT_SECRET}
jwt.expiration=604800000

# CORS — comma-separated list of allowed frontend origins
frontend.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}

# Chat session TTL (minutes): sessions idle beyond this are evicted
chat.session.ttl-minutes=30

# Gemini — set GEMINI_API_KEY in environment or application-local.properties
gemini.api.key=${GEMINI_API_KEY}
gemini.model.name=${GEMINI_MODEL_NAME:gemini-2.5-flash-lite}
gemini.temperature=0.7
gemini.top_p=1
gemini.frequency.penalty=0.5
gemini.presence.penalty=0.5
gemini.max.output_tokens=2048
gemini.rpm.limit=5
gemini.tpm.limit=100000

# Cookie settings — set COOKIE_SECURE=true and COOKIE_SAME_SITE=None in cross-origin production deployments
app.cookie.secure=${COOKIE_SECURE:false}
app.cookie.same-site=${COOKIE_SAME_SITE:Lax}

# Request size limits — prevent oversized payloads from reaching the LLM pipeline
spring.servlet.multipart.max-request-size=1MB
spring.servlet.multipart.max-file-size=1MB
server.tomcat.max-http-form-post-size=1MB

# Redis — used for chat session storage in all non-local profiles
# Set REDIS_URL in production (Railway injects this automatically as an addon env var)
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}

# Actuator — expose only health and info for Railway / Docker health probes
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
